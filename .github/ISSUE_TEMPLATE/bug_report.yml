name: Bug Report
description: Report incorrect Tune, Dyno, LSP, stdlib, or runtime behavior.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Small Tune program or command sequence that reproduces the issue.
      render: tn
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Include diagnostics, CLI output, or editor behavior.
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command
      description: Example: dyno check file.tn, dyno run file.tn, dyno lsp.
  - type: input
    id: version
    attributes:
      label: Version
      description: Commit SHA, release version, or local checkout description.
